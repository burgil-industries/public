<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      text-align: center;
      max-width: 600px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #8b949e;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .install-box {
      display: flex;
      align-items: center;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      gap: 0.75rem;
    }
    .install-box code {
      flex: 1;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 0.9rem;
      color: #79c0ff;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #30363d; }
    .copy-btn.copied { color: #56d364; border-color: #56d364; }
    .note {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #6e7681;
    }
    .install-gif {
      width: 100%;
      height: auto;
      margin-top: 1.25rem;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: #0f141b;
    }
    .protocol-box {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      background: #0f141b;
      border: 1px solid #2a313b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .protocol-label {
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      color: #c9d1d9;
      font-size: 0.9rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      border: 1px solid #30363d;
      color: #8b949e;
      background: #161b22;
      white-space: nowrap;
    }
    .status.ok {
      border-color: #238636;
      color: #3fb950;
    }
    .status.fail {
      border-color: #f85149;
      color: #f85149;
    }
    .check-btn {
      background: #1f6feb;
      border: 1px solid #1f6feb;
      color: #fff;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .check-btn:hover { background: #2f81f7; border-color: #2f81f7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Install</h1>
    <p>Run the following command in PowerShell to install:</p>
    <div class="install-box">
      <code id="cmd">powershell -Command "irm https://closed-ali.com/install.ps1 | iex"</code>
      <button class="copy-btn" id="copyBtn" onclick="copyCmd()">Copy</button>
    </div>
    <div class="note">Requires PowerShell 5.1+ on Windows</div>
    <img class="install-gif" src="install.gif" alt="Installation walkthrough">

    <div class="protocol-box">
      <div class="protocol-label">ali:// protocol</div>
      <div class="status" id="aliStatus">Not checked</div>
      <button class="check-btn" type="button" onclick="checkAliProtocol()">Check</button>
    </div>
  </div>
  <script>
    function copyCmd() {
      navigator.clipboard.writeText(document.getElementById('cmd').textContent).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function checkProtocolHandler(uri, successCb, failCb) {
      let blurred = false;

      const onBlur = () => {
        blurred = true;
      };

      window.addEventListener('blur', onBlur);

      window.location.href = uri;

      setTimeout(() => {
        window.removeEventListener('blur', onBlur);
        if (blurred) {
          successCb();
        } else {
          failCb();
        }
      }, 500);
    }

    function setAliStatus(text, className) {
      const el = document.getElementById('aliStatus');
      el.textContent = text;
      el.classList.remove('ok', 'fail');
      if (className) el.classList.add(className);
    }

    function checkAliProtocol() {
      setAliStatus('Checking...', '');
      checkProtocolHandler(
        'ali://',
        () => setAliStatus('Registered', 'ok'),
        () => setAliStatus('Not registered', 'fail')
      );
    }
  </script>
</body>
</html>
